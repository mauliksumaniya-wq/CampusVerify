<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusVerify Ultra</title>

    <!-- ... other tags ... -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f2027">
    
    <!-- iPhone Icon -->
    <link rel="apple-touch-icon" href="icon.png">  <-- MUST BE icon.png
    
    <!-- Android Address Bar Color -->
    <meta name="mobile-web-app-capable" content="yes">
    <!-- ... rest of head ... -->

    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
    <style>
        :root { --primary: #00c6ff; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; max-width: 480px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .btn-back { background: #444; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #ff4b2b; }
        .hidden { display: none !important; }
        .qr-box { background: white; padding: 10px; width: 150px; height: 150px; margin: 15px auto; border-radius: 12px; }
        .display-text { font-size: 20px; font-weight: bold; margin: 10px 0; color: var(--primary); }
        .session-item { background: #252525; padding: 15px; border-radius: 12px; margin-top: 10px; text-align: left; border-left: 5px solid var(--primary); }
        .stat-line { display: flex; justify-content: space-between; margin-top: 10px; font-size: 14px; }
        .absent-link { color: #ff4b2b; font-weight: bold; text-decoration: underline; cursor: pointer; }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">CampusVerify Ultra</h2>

    <div id="mainView">
        <button onclick="showView('loginView')">Teacher Login</button>
        <button onclick="checkStudentAccess()">Student Portal</button>
    </div>

    <!-- TEACHER LOGIN -->
    <div id="loginView" class="hidden">
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button onclick="doSecureLogin()">Secure Login</button>
        <button class="btn-back" onclick="showView('mainView')">Back</button>
    </div>

    <!-- TEACHER DASHBOARD -->
    <div id="teacherView" class="hidden">
        <button onclick="hCreateSession()">1. Create Session ID</button>
        <div id="sQR" class="qr-box hidden"></div>
        <div id="sDisplay" class="display-text"></div>
        <button onclick="hCreateCode()">2. Generate Code</button>
        <div id="cQR" class="qr-box hidden"></div>
        <div id="cDisplay" class="display-text" style="color:#00ffcc"></div>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <h3>History Dashboard</h3>
        <button onclick="loadDashboard()" style="background:#28a745">?? Refresh History</button>
        <div id="historyList"></div>
        <button class="btn-success" onclick="downloadCSV()" style="margin-top:20px">?? Download Report</button>
        <button class="btn-danger" onclick="resetAttendance()">??? Reset Attendance</button>
        <button class="btn-danger" onclick="resetSessions()" style="background:#cc0000">??? Reset History</button>
        <button class="btn-back" onclick="showView('mainView')" style="margin-top:20px">Logout</button>
    </div>

    <!-- STUDENT PORTAL -->
    <div id="studentView" class="hidden">
        <div id="sVerify">
            <input id="isid" placeholder="Session ID">
            <input id="icode" placeholder="Verify Code">
            <button onclick="requestGPS()">Verify Codes & Location</button>
        </div>
        <div id="sMark" class="hidden">
            <select id="sList"></select>
            <button id="pBtn" onclick="submitFinal()">Submit Attendance</button>
        </div>
        <div id="status" style="margin-top:15px; font-size:14px; color:var(--primary);">Ready</div>
        <button class="btn-back" onclick="showView('mainView')">Back Home</button>
    </div>
</div>

<div id="modal">
    <div class="modal-box">
        <h3 style="color:#ff4b2b">Absent Students</h3>
        <div id="absentNames" style="text-align: left; line-height: 2;"></div>
        <button onclick="closeModal()" style="margin-top:20px; background:#444">Close</button>
    </div>
</div>

<script>
    const SURL = "https://script.google.com/macros/s/AKfycbw_VCsvJh48klDx2258U0n1s5OXij_JtecFG_eYVLvzhbrYQ-1dmyJfgvxF8L89_IBQ/exec"; // REPLACE THIS
    let uLat, uLon, students, dashboardData, activeSid;

    function showView(id) {
        document.querySelectorAll('.card > div').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'teacherView') loadDashboard();
    }

    async function doSecureLogin() {
        const pass = document.getElementById('adminPass').value;
        const res = await fetch(SURL, { method: "POST", body: JSON.stringify({type:"login", password: pass}) });
        const result = await res.text();
        if (result === "SUCCESS") showView('teacherView');
        else alert("Unauthorized Access");
    }

    function checkStudentAccess() {
        if (localStorage.getItem("att_lock") === new Date().toLocaleDateString()) {
            alert("Device Locked: You have already marked your attendance today.");
            showView('mainView');
        } else {
            showView('studentView');
        }
    }

    // --- GPS & VERIFY LOGIC ---
    function requestGPS() {
        const sid = document.getElementById('isid').value.trim();
        const vco = document.getElementById('icode').value.trim();
        if(!sid || !vco) return alert("Enter codes first");

        document.getElementById('status').innerText = "??? Refreshing GPS Signal...";
        navigator.geolocation.getCurrentPosition(pos => {
            uLat = pos.coords.latitude;
            uLon = pos.coords.longitude;
            verifyAndCheckLocation(); 
        }, () => alert("GPS Permission Denied"), { enableHighAccuracy: true, maximumAge: 0 });
    }

    async function verifyAndCheckLocation() {
        const status = document.getElementById('status');
        status.innerText = "Verifying Location & Codes...";

        try {
            // 1. Check Distance first
            const locRes = await fetch(`${SURL}?action=checkLocation&lat=${uLat}&lon=${uLon}`);
            const locData = await locRes.json();

            if (locData.status === "OUT_OF_RANGE") {
                alert(`? SECURITY REJECTION: You are ${locData.distance} km away from campus.`);
                status.innerText = "? Too far from college.";
                return;
            }

            // 2. Check Codes
            const sid = document.getElementById('isid').value.trim();
            const vco = document.getElementById('icode').value.trim();
            const res = await fetch(`${SURL}?action=getSessions&t=${Date.now()}`);
            const sessions = await res.json();
            const match = sessions.find(x => x.session === sid && x.code === vco);
            
            if(match) {
                status.innerText = "Loading student list...";
                const sRes = await fetch(SURL + "?action=getStudents");
                students = await sRes.json();
                document.getElementById('sVerify').classList.add('hidden');
                document.getElementById('sMark').classList.remove('hidden');
                document.getElementById('sList').innerHTML = students.map((s,i) => `<option value="${i}">${s.name} (${s.roll})</option>`).join('');
                status.innerText = "? Location & Codes OK.";
            } else {
                alert("Invalid Session ID or Code.");
                status.innerText = "? Invalid Codes.";
            }
        } catch(e) { status.innerText = "? Connection Error."; }
    }

    async function submitFinal() {
        const btn = document.getElementById('pBtn');
        const stud = students[document.getElementById('sList').value];
        btn.disabled = true;
        document.getElementById('status').innerText = "Registering...";

        const res = await fetch(SURL, { method: "POST", body: JSON.stringify({
            type: "markPresent", session: document.getElementById('isid').value,
            name: stud.name, roll: stud.roll, class: stud.class, lat: uLat, lon: uLon
        })});
        const result = await res.text();
        if(result === "SUCCESS") {
            localStorage.setItem("att_lock", new Date().toLocaleDateString());
            document.getElementById('status').innerText = "? Attendance Marked!";
            document.getElementById('sMark').innerHTML = "<h3>Success!</h3>";
        } else alert(result);
    }

    // --- TEACHER ACTIONS ---
    async function hCreateSession() {
        activeSid = "SESS-" + Math.floor(100000 + Math.random()*900000);
        document.getElementById('sQR').innerHTML = ""; document.getElementById('sQR').classList.remove('hidden');
        new QRCode(document.getElementById('sQR'), { text: activeSid, width: 150, height: 150 });
        document.getElementById('sDisplay').innerText = activeSid;
        await fetch(SURL, { method: "POST", body: JSON.stringify({type:"createSession", session: activeSid}) });
    }

    async function hCreateCode() {
        if(!activeSid) return alert("Create Session First");
        let code = Math.floor(1000 + Math.random()*8999).toString();
        document.getElementById('cQR').innerHTML = ""; document.getElementById('cQR').classList.remove('hidden');
        new QRCode(document.getElementById('cQR'), { text: code, width: 150, height: 150 });
        document.getElementById('cDisplay').innerText = "CODE: " + code;
        await fetch(SURL, { method: "POST", body: JSON.stringify({type:"updateCode", session: activeSid, code: code}) });
    }

    async function loadDashboard() {
        const h = document.getElementById('historyList');
        try {
            const res = await fetch(`${SURL}?action=getDashboard&t=${Date.now()}`);
            dashboardData = await res.json();
            h.innerHTML = dashboardData.map((item, i) => `<div class="session-item"><small>${new Date(item.date).toLocaleString()}</small><div><b>ID: ${item.sid} | Code: ${item.code}</b></div><div class="stat-line"><span style="color:#00ffcc">Present: ${item.present}</span><span class="absent-link" onclick="openAbsents(${i})">Absent: ${item.absent} (View)</span></div></div>`).join('');
        } catch(e) { h.innerText = "No sessions."; }
    }

    function openAbsents(i) {
        const names = dashboardData[i].absentNames;
        document.getElementById('absentNames').innerHTML = names.length > 0 ? names.map(n => "• " + n).join("<br>") : "Everyone is present!";
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    async function downloadCSV() { const res = await fetch(SURL + "?action=downloadReport"); const data = await res.json(); let csv = "data:text/csv;charset=utf-8," + data.map(e => e.join(",")).join("\n"); const link = document.createElement("a"); link.href = encodeURI(csv); link.download = "Attendance.csv"; link.click(); }
    async function resetAttendance() { if(confirm("Reset Present list?")) await fetch(SURL, { method: "POST", body: JSON.stringify({type:"resetAttendance"}) }); location.reload(); }
    async function resetSessions() { if(confirm("Reset History?")) await fetch(SURL, { method: "POST", body: JSON.stringify({type:"resetSessions"}) }); location.reload(); }
</script>
</body>
</html>
